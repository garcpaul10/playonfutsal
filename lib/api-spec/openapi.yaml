                          type: integer
                        tournament:
                          type: integer

  /admin/reports/retention:
    get:
      operationId: adminReportsRetention
      tags: [admin]
      summary: Retention report — new vs returning players per season (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Retention data by season
          content:
            application/json:
              schema:
                type: object
                properties:
                  seasons:
                    type: array
                    items:
                      type: object
                      properties:
                        seasonId:
                          type: integer
                        seasonName:
                          type: string
                        startDate:
                          type: ["string", "null"]
                        endDate:
                          type: ["string", "null"]
                        totalPlayers:
                          type: integer
                        newPlayers:
                          type: integer
                        returningPlayers:
                          type: integer
                        retentionRate:
                          type: integer
                  summary:
                    type: object
                    properties:
                      totalRegisteredUsers:
                        type: integer
                      totalActivePlayers:
                        type: integer

