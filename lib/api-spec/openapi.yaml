  /admin/memberships:
    get:
      operationId: adminListMemberships
      tags: [admin, memberships]
      summary: List all user memberships (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, cancelled, past_due]
        - name: planId
          in: query
