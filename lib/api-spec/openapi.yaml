  # ── Memberships ────────────────────────────────────────────────────────────

  /membership-plans:
    get:
      operationId: listMembershipPlans
      tags: [memberships]
      summary: List active membership plans
      description: Returns all active plans visible to the public
      responses:
        "200":
          description: Active membership plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipPlan"

  /memberships/my:
    get:
      operationId: getMyMembership
      tags: [memberships]
      summary: Get caller's active membership
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active membership with embedded plan, or null
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: Active membership with embedded plan details
                    allOf:
                      - $ref: "#/components/schemas/UserMembership"
                      - type: object
                        properties:
                          plan:
                            $ref: "#/components/schemas/MembershipPlan"
                  - type: "null"

  /memberships/subscribe:
    post:
      operationId: subscribeMembership
      tags: [memberships]
      summary: Subscribe to a membership plan
      description: >
        Creates a Stripe Checkout Session (subscription mode) for paid plans.
        Free plans (price = $0, no Stripe Price ID) are granted immediately.
        Paid plans without a linked Stripe Price ID return 400 — they must be
        configured via the admin plan creation endpoint before users can enroll.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [planId]
              properties:
                planId:
                  type: integer
                successUrl:
                  type: string
                cancelUrl:
                  type: string
      responses:
        "200":
          description: Stripe checkout URL or created membership
          content:
            application/json:
              schema:
                type: object
                properties:
                  checkoutUrl:
                    type: ["string", "null"]
        "201":
          description: Manual membership created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserMembership"
        "400":
          description: Plan not configured for payment (paid plan missing Stripe Price ID)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "409":
          description: User already has an active membership

  /memberships/cancel:
    post:
      operationId: cancelMembership
      tags: [memberships]
      summary: Cancel caller's active membership
      description: For Stripe subscriptions sets cancel_at_period_end and relies on webhook for final status update. For manual memberships cancels immediately.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cancellation confirmed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /admin/membership-plans:
    get:
      operationId: adminListMembershipPlans
      tags: [admin, memberships]
      summary: List all membership plans (admin)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All plans including inactive
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MembershipPlan"
    post:
      operationId: adminCreateMembershipPlan
      tags: [admin, memberships]
      summary: Create a membership plan (super-admin)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, price]
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: string
                billingCycle:
                  type: string
                trialDays:
                  type: integer
                features:
                  type: array
                  items:
                    type: string
                discountPercent:
                  type: string
                isActive:
                  type: boolean
                stripePriceId:
                  type: string
                stripeProductId:
                  type: string
                createStripeProduct:
                  type: boolean
      responses:
        "201":
          description: Created plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MembershipPlan"

  /admin/membership-plans/{id}:
    patch:
      operationId: adminUpdateMembershipPlan
      tags: [admin, memberships]
      summary: Update a membership plan (super-admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                price:
                  type: string
                billingCycle:
                  type: string
                isActive:
                  type: boolean
                stripePriceId:
                  type: string
                stripeProductId:
                  type: string
      responses:
        "200":
          description: Updated plan
          content:
