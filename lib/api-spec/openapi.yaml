openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: PlayOn futsal management platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: programs
    description: Browse leagues, camps, drop-ins, tournaments
  - name: leagues
    description: League management
  - name: camps
    description: Camp management
  - name: dropins
    description: Drop-in session management
  - name: tournaments
    description: Tournament management
  - name: courts
    description: Court management
  - name: users
    description: User profile & RBAC
  - name: admin
    description: Admin dashboard & management
  - name: registrations
    description: Player registrations
  - name: teams
    description: Team management
  - name: seasons
    description: Season management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── COURTS ─────────────────────────────────────────────────────────────────
  /courts:
    get:
      operationId: listCourts
      tags: [courts]
      summary: List all courts
      responses:
        "200":
          description: List of courts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Court"

  /courts/{id}:
    get:
      operationId: getCourt
      tags: [courts]
      summary: Get a court
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Court
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Court"
        "404":
          description: Not found

  # ── SEASONS ─────────────────────────────────────────────────────────────────
  /seasons:
    get:
      operationId: listSeasons
      tags: [seasons]
      summary: List seasons
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Seasons list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Season"
    post:
      operationId: createSeason
      tags: [seasons]
      summary: Create a season (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeasonInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"

  /seasons/{id}:
    get:
      operationId: getSeason
      tags: [seasons]
      summary: Get a season
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Season
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"
        "404":
          description: Not found
    patch:
      operationId: updateSeason
      tags: [seasons]
      summary: Update a season (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeasonUpdate"
      responses:
        "200":
          description: Updated season
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Season"

  # ── PROGRAMS (unified browse surface) ───────────────────────────────────────
  /programs/featured:
    get:
      operationId: listFeaturedPrograms
      tags: [programs]
      summary: List featured programs for homepage
      responses:
        "200":
          description: Featured programs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgramSummary"

  /programs:
    get:
      operationId: listPrograms
      tags: [programs]
      summary: Browse all programs
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [league, camp, drop_in, tournament]
        - name: ageGroup
          in: query
          schema:
            type: string
        - name: season
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Programs list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProgramSummary"

  # ── LEAGUES ──────────────────────────────────────────────────────────────────
  /leagues:
    get:
      operationId: listLeagues
      tags: [leagues]
      summary: List leagues
      parameters:
        - name: seasonId
          in: query
          schema:
            type: integer
        - name: ageGroup
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, active, completed]
      responses:
        "200":
          description: Leagues
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/League"
    post:
      operationId: createLeague
      tags: [leagues]
      summary: Create a league (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeagueInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/League"

  /leagues/{id}:
    get:
      operationId: getLeague
      tags: [leagues]
      summary: Get a league
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: League
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/League"
        "404":
          description: Not found
    patch:
      operationId: updateLeague
      tags: [leagues]
      summary: Update a league (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeagueUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/League"
    delete:
      operationId: deleteLeague
      tags: [leagues]
      summary: Delete a league (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── CAMPS ─────────────────────────────────────────────────────────────────
  /camps:
    get:
      operationId: listCamps
      tags: [camps]
      summary: List camps
      parameters:
        - name: ageGroup
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, active, completed]
      responses:
        "200":
          description: Camps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Camp"
    post:
      operationId: createCamp
      tags: [camps]
      summary: Create a camp (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Camp"

  /camps/{id}:
    get:
      operationId: getCamp
      tags: [camps]
      summary: Get a camp
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Camp
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Camp"
        "404":
          description: Not found
    patch:
      operationId: updateCamp
      tags: [camps]
      summary: Update a camp (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Camp"
    delete:
      operationId: deleteCamp
      tags: [camps]
      summary: Delete a camp (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── DROP-IN SESSION TEMPLATES ─────────────────────────────────────────────────
  /dropins/templates:
    get:
      operationId: listSessionTemplates
      tags: [dropins]
      summary: List session templates (admin)
      responses:
        "200":
          description: Session templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionTemplate"
    post:
      operationId: createSessionTemplate
      tags: [dropins]
      summary: Create a session template (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionTemplateInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionTemplate"

  /dropins/templates/{id}:
    get:
      operationId: getSessionTemplate
      tags: [dropins]
      summary: Get a session template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionTemplate"
        "404":
          description: Not found
    patch:
      operationId: updateSessionTemplate
      tags: [dropins]
      summary: Update a session template (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionTemplateUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionTemplate"
    delete:
      operationId: deleteSessionTemplate
      tags: [dropins]
      summary: Delete a session template (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dropins/templates/{id}/generate:
    post:
      operationId: generateSessionsFromTemplate
      tags: [dropins]
      summary: Generate drop-in sessions from a template (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateSessionsInput"
      responses:
        "201":
          description: Sessions generated
          content:
            application/json:
              schema:
                type: object
                required: [sessions]
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/Dropin"

  # ── DROP-INS ─────────────────────────────────────────────────────────────────
  /dropins:
    get:
      operationId: listDropins
      tags: [dropins]
      summary: List drop-in sessions
      parameters:
        - name: courtId
          in: query
          schema:
            type: integer
        - name: ageGroup
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Drop-in sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dropin"
    post:
      operationId: createDropin
      tags: [dropins]
      summary: Create a drop-in session (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropinInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dropin"

  /dropins/{id}:
    get:
      operationId: getDropin
      tags: [dropins]
      summary: Get a drop-in session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Drop-in session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dropin"
        "404":
          description: Not found
    patch:
      operationId: updateDropin
      tags: [dropins]
      summary: Update a drop-in session (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropinUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dropin"
    delete:
      operationId: deleteDropin
      tags: [dropins]
      summary: Delete a drop-in session (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── DROP-IN COURT POOLS ───────────────────────────────────────────────────────
  /dropins/{id}/pools:
    get:
      operationId: listDropinCourtPools
      tags: [dropins]
      summary: List court pools for a drop-in session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Court pools with live spot counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DropinCourtPool"
    post:
      operationId: addDropinCourtPool
      tags: [dropins]
      summary: Add a court pool to a drop-in session (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropinCourtPoolInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropinCourtPool"

  /dropins/{id}/pools/{poolId}:
    patch:
      operationId: updateDropinCourtPool
      tags: [dropins]
      summary: Update a court pool cap or close it (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropinCourtPoolUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropinCourtPool"
    delete:
      operationId: removeDropinCourtPool
      tags: [dropins]
      summary: Remove a court pool from a drop-in session (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── DROP-IN RSVP / SPOTS ──────────────────────────────────────────────────────
  /dropins/pools/{poolId}/rsvp:
    post:
      operationId: rsvpDropinPool
      tags: [dropins]
      summary: Claim a spot or join waitlist for a court pool (auth)
      parameters:
        - name: poolId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Spot or waitlist entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropinSpot"
        "400":
          description: Already registered or pool closed
        "409":
          description: Already has an active spot in this pool

  /dropins/spots/{spotId}:
    delete:
      operationId: cancelDropinSpot
      tags: [dropins]
      summary: Cancel a drop-in spot (own or admin)
      parameters:
        - name: spotId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Spot cancelled and next waitlisted player (if any) promoted
          content:
            application/json:
              schema:
                type: object
                required: [spot]
                properties:
                  spot:
                    $ref: "#/components/schemas/DropinSpot"
                  promoted:
                    $ref: "#/components/schemas/DropinSpot"

  /dropins/spots/{spotId}/payment:
    patch:
      operationId: updateDropinSpotPayment
      tags: [dropins]
      summary: Admin mark payment status on a spot
      parameters:
        - name: spotId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentStatus]
              properties:
                paymentStatus:
                  type: string
                  enum: [unpaid, paid_inapp, paid_external, refunded, waived]
                notes:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropinSpot"

  /dropins/spots/{spotId}/noshow:
    patch:
      operationId: markDropinNoShow
      tags: [dropins]
      summary: Admin mark player as no-show and optionally promote next waitlisted
      parameters:
        - name: spotId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                promote:
                  type: boolean
                  description: If true, auto-promote next waitlisted player
      responses:
        "200":
          description: No-show recorded
          content:
            application/json:
              schema:
                type: object
                required: [spot]
                properties:
                  spot:
                    $ref: "#/components/schemas/DropinSpot"
                  promoted:
                    $ref: "#/components/schemas/DropinSpot"

  /dropins/{id}/roster:
    get:
      operationId: getDropinRoster
      tags: [dropins]
      summary: Get full roster for a drop-in session (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session roster grouped by pool
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropinRoster"

  /dropins/{id}/spots:
    post:
      operationId: adminAddDropinSpot
      tags: [dropins]
      summary: Admin manually add a player to a pool (bypasses cap/waitlist)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [poolId, userId]
              properties:
                poolId:
                  type: integer
                userId:
                  type: integer
                waitlisted:
                  type: boolean
                paymentStatus:
                  type: string
                  enum: [unpaid, paid_inapp, paid_external, refunded, waived]
                notes:
                  type: string
      responses:
        "201":
          description: Spot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropinSpot"

  # ── DROP-IN CHECK-IN ──────────────────────────────────────────────────────────
  /dropins/{id}/checkin:
    get:
      operationId: getDropinCheckinView
      tags: [dropins]
      summary: Get the day-of check-in view for a session (admin/staff)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Check-in view with pools, spots, check-in state, and waiver flags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropinCheckinView"
    post:
      operationId: checkinDropinPlayer
      tags: [dropins]
      summary: Check in a player (QR scan or manual search) (admin/staff)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DropinCheckinInput"
      responses:
        "200":
          description: Check-in recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DropinCheckinResult"
        "404":
          description: Player not found or not registered

  # ── TOURNAMENTS ───────────────────────────────────────────────────────────────
  /tournaments:
    get:
      operationId: listTournaments
      tags: [tournaments]
      summary: List tournaments
      parameters:
        - name: ageGroup
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, active, completed]
      responses:
        "200":
          description: Tournaments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tournament"
    post:
      operationId: createTournament
      tags: [tournaments]
      summary: Create a tournament (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /tournaments/{id}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get a tournament
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tournament
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
        "404":
          description: Not found
    patch:
      operationId: updateTournament
      tags: [tournaments]
      summary: Update a tournament (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TournamentUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"
    delete:
      operationId: deleteTournament
      tags: [tournaments]
      summary: Delete a tournament (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── REGISTRATIONS ────────────────────────────────────────────────────────────
  /registrations:
    get:
      operationId: listRegistrations
      tags: [registrations]
      summary: List registrations (admin or own)
      parameters:
        - name: userId
          in: query
          schema:
            type: string
        - name: programType
          in: query
          schema:
            type: string
            enum: [league, camp, drop_in, tournament]
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, confirmed, cancelled, waitlisted]
      responses:
        "200":
          description: Registrations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Registration"
    post:
      operationId: createRegistration
      tags: [registrations]
      summary: Register for a program
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegistrationInput"
      responses:
        "201":
          description: Registration created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Registration"

  /registrations/{id}:
    get:
      operationId: getRegistration
      tags: [registrations]
      summary: Get a registration
